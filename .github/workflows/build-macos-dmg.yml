name: Build macOS DMG

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional GitHub release tag to attach DMGs to (e.g. desktop-v0.15.1)"
        required: false
        type: string
  release:
    types: [published]

permissions:
  contents: read

jobs:
  authorize:
    name: Authorize (admins only)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check actor is a repo admin
        env:
          GH_TOKEN: ${{ github.token }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          perm=$(gh api \
            "repos/${{ github.repository }}/collaborators/${ACTOR}/permission" \
            --jq '.permission')
          echo "Actor '${ACTOR}' has permission: ${perm}"
          if [ "${perm}" != "admin" ]; then
            echo "::error::'${ACTOR}' is not a repo admin (permission=${perm}). Refusing to build."
            exit 1
          fi
          echo "Authorized: '${ACTOR}' is an admin."

  build:
    name: DMG (${{ matrix.arch }})
    needs: [authorize]
    if: |
      always() &&
      (needs.authorize.result == 'success' || needs.authorize.result == 'skipped') &&
      (github.event_name == 'release' || github.event_name == 'workflow_dispatch')
    runs-on: macos-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
          - arch: x64
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build macOS DMG (${{ matrix.arch }})
        working-directory: apps/desktop
        env:
          # Stage the correct node-pty prebuild for the target arch.
          npm_config_arch: ${{ matrix.arch }}
          # Unsigned builds when Apple signing secrets are not configured.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Optional — set repo secrets to sign + notarize (see apps/desktop/scripts/notarize.cjs).
          CSC_LINK: ${{ secrets.APPLE_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
        run: npm run dist:mac:dmg -- --${{ matrix.arch }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: berdaya-macos-dmg-${{ matrix.arch }}
          path: apps/desktop/release/*.dmg
          if-no-files-found: error

  attach-release:
    name: Attach to GitHub Release
    needs: build
    if: |
      always() && needs.build.result == 'success' && (
        github.event_name == 'release' ||
        (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download DMG artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          pattern: berdaya-macos-dmg-*
          path: dist
          merge-multiple: true

      - name: Resolve release tag
        id: tag
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for GitHub Release to exist
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "Release $TAG found"
              exit 0
            fi
            echo "Waiting for release $TAG... ($i/30)"
            sleep 10
          done
          echo "::error::Release $TAG not found after 5 minutes"
          exit 1

      - name: Upload DMGs to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/*.dmg)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No DMG files found in dist/"
            ls -la dist/ || true
            exit 1
          fi
          echo "Uploading ${#files[@]} DMG(s) to release $TAG:"
          printf '  %s\n' "${files[@]}"
          gh release upload "$TAG" "${files[@]}" --repo "$GITHUB_REPOSITORY" --clobber
